name: Daily Job Scraper

on:
  schedule:
    # Sharded batches: 6 hourly runs 18:30–23:30 UTC (00:00–05:00 IST). Each run
    # processes shard = (UTC hour mod 6), so all shards are covered by ~06:00 IST.
    # See docs/SCALING.md. (18%6=0, 19%6=1, … 23%6=5.)
    - cron: '30 18 * * *'
    - cron: '30 19 * * *'
    - cron: '30 20 * * *'
    - cron: '30 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'

  # Manual trigger (also used by the "Refresh Now" button) — does a FULL run.
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

permissions:
  contents: write   # lets the run commit docs/LAST_RUN.md back to main

# Serialize ALL runs of this workflow — a manual "Refresh Now" full run must not
# execute concurrently with a scheduled shard (both write the same job_feed /
# jobs_pool rows → deadlocks + dropped batches). New runs queue, they don't cancel.
concurrency:
  group: daily-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Run Job Scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2,788 fetch units since harvested-cap 1000; 60 was killing runs mid-fetch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5

      - name: Install embeddings deps (optional semantic rerank)
        run: pip install -r requirements-embeddings.txt
        continue-on-error: true   # rerank is optional — run degrades to keyword scoring

      - name: Run job scrapers
        env:
          INGEST_WORKERS:         '40'   # fetch is IO-bound; 16 workers x 2,788 units blew past 60 min
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL:   ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Optional: enables Adzuna (adds India + salary data to the pool).
          # Free keys at developer.adzuna.com. Leave unset to skip cleanly.
          ADZUNA_APP_ID:         ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:        ${{ secrets.ADZUNA_APP_KEY }}
          # Optional: enables Jooble (second India breadth index). Free key at
          # jooble.org/api/about. Leave unset to skip cleanly.
          JOOBLE_API_KEY:        ${{ secrets.JOOBLE_API_KEY }}
          # Scheduled runs are sharded (6 batches across the night); manual runs
          # (and the Refresh Now button) do a full single run.
          BATCH_TOTAL:           ${{ github.event_name == 'schedule' && '6' || '1' }}
          # Shard index from the CRON STRING that fired, not wall-clock hour — a
          # delayed GitHub cron used to compute the wrong shard (one doubled, one
          # skipped). Manual runs (no schedule) leave this empty → full run.
          BATCH_INDEX: >-
            ${{
              github.event.schedule == '30 18 * * *' && '0' ||
              github.event.schedule == '30 19 * * *' && '1' ||
              github.event.schedule == '30 20 * * *' && '2' ||
              github.event.schedule == '30 21 * * *' && '3' ||
              github.event.schedule == '30 22 * * *' && '4' ||
              github.event.schedule == '30 23 * * *' && '5' || ''
            }}
          LOG_LEVEL:             ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
          # Skills flywheel — requires jobs_pool.skills column
          # (supabase/migrations/2026-07-17-flywheels.sql). Env-gated in code.
          INGEST_SKILLS: '0'   # A/B OFF 2026-07-17: prime suspect for 2h runs (CPU-bound regex under the GIL)
          USE_EMBEDDINGS:        '1'
          FASTEMBED_CACHE_PATH:  ~/.cache/fastembed
        run: python main.py

      - name: Track job fingerprints (repost/lifetime flywheel)
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.track_fingerprints

      - name: Commit run report
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "run-report"
          git config user.email "run-report@users.noreply.github.com"
          git add docs/LAST_RUN.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: run report [skip ci]"
          # 6 sharded runs can race on the push — rebase-retry a few times
          for i in 1 2 3 4; do
            git push && exit 0
            git pull --rebase --autostash || true
          done
          echo "report push failed after retries (non-fatal)"

      - name: Report status
        if: always()
        run: |
          echo "Run completed at $(date -u)"
          echo "Status: ${{ job.status }}"
