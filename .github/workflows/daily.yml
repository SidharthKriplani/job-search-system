name: Daily Job Scraper

on:
  schedule:
    # Sharded batches: 6 hourly runs 18:30–23:30 UTC (00:00–05:00 IST). Each run
    # processes shard = (UTC hour mod 6), so all shards are covered by ~06:00 IST.
    # See docs/SCALING.md. (18%6=0, 19%6=1, … 23%6=5.)
    - cron: '30 18 * * *'
    - cron: '30 19 * * *'
    - cron: '30 20 * * *'
    - cron: '30 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'

  # Manual trigger (also used by the "Refresh Now" button) — does a FULL run.
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Run Job Scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright (for Naukri refresh)
        run: |
          pip install playwright==1.42.0
          playwright install chromium --with-deps
        continue-on-error: true   # non-critical if it fails

      - name: Run job scrapers
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL:   ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Optional: enables Adzuna (adds India + salary data to the pool).
          # Free keys at developer.adzuna.com. Leave unset to skip cleanly.
          ADZUNA_APP_ID:         ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:        ${{ secrets.ADZUNA_APP_KEY }}
          # Scheduled runs are sharded (6 batches across the night); manual runs
          # (and the Refresh Now button) do a full single run.
          BATCH_TOTAL:           ${{ github.event_name == 'schedule' && '6' || '1' }}
          LOG_LEVEL:             ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
        run: python main.py

      - name: Run Naukri profile refresh (optional)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python naukri_refresh.py
        continue-on-error: true  # non-critical — failure doesn't break the run

      - name: Report status
        if: always()
        run: |
          echo "Run completed at $(date -u)"
          echo "Status: ${{ job.status }}"
